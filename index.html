<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack Platform - Hackathon Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 font-sans">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
            <h2 class="text-xl font-bold mb-4 text-emerald-800">Track Daily Parameters</h2>
            <form id="track-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Transport Distance (km)</label>
                    <input type="number" id="distance" placeholder="e.g. 15" class="w-full border p-2 rounded-lg focus:outline-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Transport Mode</label>
                    <select id="transport-mode" class="w-full border p-2 rounded-lg">
                        <option value="petrol">Petrol Car</option>
                        <option value="diesel">Diesel Car</option>
                        <option value="ev">Electric Vehicle</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Electricity Usage (kWh)</label>
                    <input type="number" id="electricity" placeholder="e.g. 12" class="w-full border p-2 rounded-lg focus:outline-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Diet Preference</label>
                    <select id="diet" class="w-full border p-2 rounded-lg">
                        <option value="meat">Heavy Meat Eater</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                    </select>
                </div>
                <button type="button" id="log-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition-colors">Log Activities</button>
            </form>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
                    <p class="text-xs font-bold text-slate-500 tracking-wider uppercase">Daily Footprint</p>
                    <h3 class="text-3xl font-extrabold text-emerald-600 mt-2"><span id="daily-val">0.00</span> <span class="text-sm font-normal text-slate-500">kg CO2e</span></h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
                    <p class="text-xs font-bold text-slate-500 tracking-wider uppercase">Monthly Velocity</p>
                    <h3 class="text-3xl font-extrabold text-blue-600 mt-2"><span id="monthly-val">0.00</span> <span class="text-sm font-normal text-slate-500">kg CO2e</span></h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 text-center">
                    <p class="text-xs font-bold text-slate-500 tracking-wider uppercase">Target Variance</p>
                    <h3 class="text-3xl font-extrabold text-slate-800 mt-2"><span id="target-val">0%</span></h3>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-emerald-800 mb-2">Dynamic Insights Matrix</h2>
                <p id="insights-box" class="text-slate-500 text-sm italic">Fill in your environmental tracking data to calculate optimization insights.</p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-emerald-800 mb-4">Automated Integration Sandbox Tests</h2>
                <div id="sandbox-console" class="w-full bg-slate-950 text-slate-200 font-mono text-xs p-4 rounded-lg min-h-[60px] shadow-inner whitespace-pre-line leading-relaxed">Running test suites...</div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
